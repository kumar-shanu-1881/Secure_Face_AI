name: Keep Project Awake

on:
  schedule:
    # This runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the API
        run: |
          # Replace this URL with your Render API URL
          curl -I https://secure-face-ai.onrender.com/health